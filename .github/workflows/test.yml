name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::RSQLite
            any::jsonlite
            any::testthat
            any::DBI
            any::duckdb
            any::withr
            github::r-observatory/robservatory@v0.1.0

      - name: Run tests
        run: Rscript tests/testthat.R
